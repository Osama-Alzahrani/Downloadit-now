name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Cache WiX toolset
        uses: actions/cache@v4
        with:
          path: ~/.cache/tauri
          key: wix-${{ runner.os }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Get version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: List bundle output
        run: |
          Write-Host "=== All bundle files ==="
          Get-ChildItem src-tauri/target/release/bundle -Recurse | Select-Object FullName
          Write-Host "=== Sig files anywhere ==="
          Get-ChildItem src-tauri/target/release/bundle -Recurse -Filter "*.sig" | Select-Object FullName
          Write-Host "=== Private key set? ==="
          if ("${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" -ne "") { Write-Host "YES" } else { Write-Host "NO - secret is empty!" }

      - name: Generate latest.json
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $bundleDir = "src-tauri/target/release/bundle/msi"

          $msiItem = Get-ChildItem "$bundleDir" -Filter "*.msi" | Where-Object { $_.Name -notlike "*.zip*" } | Select-Object -First 1

          # Tauri v2 may produce .msi.sig or .msi.zip.sig
          $sigItem = Get-ChildItem "$bundleDir" -Recurse -Filter "*.sig" | Select-Object -First 1

          if (-not $msiItem) { Write-Error "MSI not found in $bundleDir"; exit 1 }
          if (-not $sigItem) { Write-Error "No .sig file found anywhere — is TAURI_SIGNING_PRIVATE_KEY set correctly?"; exit 1 }

          Write-Host "MSI: $($msiItem.Name)"
          Write-Host "Sig: $($sigItem.Name)"

          $sig = Get-Content $sigItem.FullName -Raw
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($msiItem.Name)"

          $json = [ordered]@{
            version  = $version
            notes    = "See the release page for what's new."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig.Trim()
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 10

          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Downloadit v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            latest.json
